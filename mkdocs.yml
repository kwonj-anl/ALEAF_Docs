site_name: A-LEAF Documentation
site_description: Documentation for the Argonne Low-Carbon Electricity Analysis Framework
site_url: https://example.github.io/a-leaf-docs/
site_dir: _site
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
plugins:
  - search
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Overview: README.md
  - Configuration:
      - Simulation Setting: configuration/ALEAF_Simulation_Setting_File.md
      - Simulation Configuration: configuration/Simulation_Configuration_Reference.md
      - Policy and Financial Settings: configuration/Policy_and_Financial_Settings.md
      - Scenario Reduction: configuration/Scenario_Reduction_and_Repday_Groups.md
  - Database:
      - Network Data: database/Network_Data_Reference.md
      - Network Configuration: database/Network_Configuration_Reference.md
      - Gen Technology: database/Gen_Technology_Reference.md
      - Storage Modeling: database/Storage_Modeling_Reference.md
      - Hybrid Resources: database/Hybrid_Resources_Reference.md
      - Large Load: database/Large_Load_and_Demand_Response_Reference.md
  - Models:
      - GTEP:
          - Overview: models/GTEP/GTEP_Overview.md
          - Planning Horizon: models/GTEP/GTEP_Planning_Horizon_and_Multi_Round.md
          - Expansion Outputs: models/GTEP/GTEP_Expansion_Outputs.md
      - Operation:
          - Overview: models/Operation/Operation_Overview.md
          - Execution: models/Operation/Operation_Execution_and_Run_Modes.md
          - Outputs: models/Operation/Operation_Outputs.md
      - RA:
          - Overview: models/RA/RA_Overview.md
          - Settings: models/RA/RA_Settings_and_Scenarios_Reference.md
          - Scenarios: models/RA/RA_Scenarios_and_Data.md
          - Execution: models/RA/RA_Execution_and_Results.md
          - Metrics: models/RA/RA_Metrics_ELCC_and_DLOL.md
          
